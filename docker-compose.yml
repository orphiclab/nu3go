version: '3.9'

services:
  # ─── Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nu3go-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nu3go-infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - nu3go-net

  # ─── Next.js Frontend ─────────────────────────────────
  web:
    build:
      context: ./nu3go-web
      dockerfile: Dockerfile
    container_name: nu3go-web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3001/v1
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - nu3go-net

  # ─── NestJS API ───────────────────────────────────────
  api:
    build:
      context: ./nu3go-api
      dockerfile: Dockerfile
    container_name: nu3go-api
    env_file:
      - ./nu3go-api/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nu3go-net

  # ─── NestJS Worker (Cron Jobs) ────────────────────────
  worker:
    build:
      context: ./nu3go-api
      dockerfile: Dockerfile
    container_name: nu3go-worker
    command: node dist/main --worker
    env_file:
      - ./nu3go-api/.env.production
    environment:
      - WORKER_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nu3go-net

  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nu3go-postgres
    environment:
      POSTGRES_DB: nu3go
      POSTGRES_USER: ${DB_USER:-nu3go}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Only expose in dev; remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nu3go} -d nu3go"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nu3go-net

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nu3go-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"  # Only expose in dev; remove in production
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nu3go-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  nu3go-net:
    driver: bridge
