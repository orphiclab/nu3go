databases:
  - name: nu3go-db
    databaseName: nu3go
    user: nu3go_user
    plan: free

services:
  # ─── NestJS API ──────────────────────────────────────────────────────────────
  - type: web
    name: nu3go-api
    runtime: node
    plan: free
    rootDir: nu3go-api
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: nu3go-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nu3go-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "nu3go <noreply@nu3go.lk>"

  # ─── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: nu3go-redis
    plan: free
    ipAllowList: []
