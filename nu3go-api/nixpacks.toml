# ─── Nixpacks config for Railway ─────────────────────────────────────────────
[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx typeorm migration:run -d dist/database/typeorm.config.js && node scripts/seed-admin.js && node dist/main"
